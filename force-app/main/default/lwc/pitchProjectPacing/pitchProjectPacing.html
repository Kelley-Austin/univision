<template>
    <lightning-card title="Pitch Pacing">
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading pacing data..." size="small"></lightning-spinner>
        </template>

        <template if:true={hasError}>
            <div class="slds-var-p-around_medium">
                <p class="slds-text-color_error">{errorMessage}</p>
            </div>
        </template>

        <template if:true={hasData}>
            <div class="slds-var-p-around_medium">

                <!-- Metric tiles -->
                <div class="slds-grid slds-wrap slds-gutters_small slds-var-m-bottom_medium">

                    <div class="slds-col slds-size_1-of-2 slds-large-size_1-of-4">
                        <div class="slds-box slds-box_x-small slds-text-align_center">
                            <p class="slds-text-title slds-text-color_weak">Goal</p>
                            <p class="slds-text-heading_medium">{formattedGoal}</p>
                        </div>
                    </div>

                    <div class="slds-col slds-size_1-of-2 slds-large-size_1-of-4">
                        <div class="slds-box slds-box_x-small slds-text-align_center tile-booked">
                            <p class="slds-text-title slds-text-color_weak">Booked</p>
                            <p class="slds-text-heading_medium">{formattedBooked}</p>
                        </div>
                    </div>

                    <div class="slds-col slds-size_1-of-2 slds-large-size_1-of-4">
                        <div class="slds-box slds-box_x-small slds-text-align_center tile-pending">
                            <p class="slds-text-title slds-text-color_weak">Pending</p>
                            <p class="slds-text-heading_medium">{formattedPending}</p>
                        </div>
                    </div>

                    <div class="slds-col slds-size_1-of-2 slds-large-size_1-of-4">
                        <div class="slds-box slds-box_x-small slds-text-align_center tile-forecast">
                            <p class="slds-text-title slds-text-color_weak">Forecast (Wtd)</p>
                            <p class="slds-text-heading_medium">{formattedForecast}</p>
                        </div>
                    </div>

                </div>

                <!-- Stacked progress bar against Goal -->
                <p class="slds-text-title_caps slds-text-color_weak slds-var-m-bottom_xx-small">
                    Progress vs. Goal
                </p>
                <div class="progress-bar-track">
                    <div class="progress-bar-booked" style={bookedBarStyle} title={bookedBarLabel}></div>
                    <div class="progress-bar-pending" style={pendingBarStyle} title={pendingBarLabel}></div>
                </div>
                <div class="slds-grid slds-var-m-top_xx-small">
                    <span class="slds-col slds-text-body_small legend-dot legend-green">&#9632; Booked ({bookedPct}%)</span>
                    <span class="slds-col slds-text-body_small legend-dot legend-yellow slds-var-m-left_small">&#9632; Pending ({pendingPct}%)</span>
                </div>

            </div>
        </template>
    </lightning-card>
</template>
