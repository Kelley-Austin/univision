<template>
    <lightning-card title="The Bible — Pacing Extract" icon-name="utility:download">

        <!-- Filter bar -->
        <div class="slds-grid slds-gutters slds-wrap slds-p-horizontal_medium slds-p-bottom_small" slot="actions">
            <div class="slds-col slds-size_1-of-6">
                <lightning-input label="Year" type="number" value={filterYear}
                    onchange={handleYearChange} variant="label-hidden"
                    placeholder="Year" min="2020" max="2030">
                </lightning-input>
            </div>
            <div class="slds-col slds-size_1-of-6">
                <lightning-combobox label="From Month" value={filterFromMonth}
                    options={monthOptions} onchange={handleFromMonthChange}
                    variant="label-hidden">
                </lightning-combobox>
            </div>
            <div class="slds-col slds-size_1-of-6">
                <lightning-combobox label="To Month" value={filterToMonth}
                    options={monthOptions} onchange={handleToMonthChange}
                    variant="label-hidden">
                </lightning-combobox>
            </div>
            <div class="slds-col slds-size_1-of-6">
                <lightning-input label="Revenue Type" type="text" value={filterRevType}
                    onchange={handleRevTypeChange} variant="label-hidden"
                    placeholder="Revenue Type">
                </lightning-input>
            </div>
            <div class="slds-col slds-size_1-of-8">
                <lightning-button label="Run" onclick={handleRun} variant="brand"></lightning-button>
            </div>
            <div class="slds-col slds-size_1-of-8">
                <lightning-button label="Export CSV" onclick={handleExport}
                    variant="neutral" disabled={noData} icon-name="utility:download">
                </lightning-button>
            </div>
        </div>

        <template lwc:if={isLoading}>
            <div class="slds-align_absolute-center slds-p-around_large">
                <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
            </div>
        </template>

        <template lwc:if={hasError}>
            <div class="slds-notify slds-notify_alert slds-alert_error slds-m-around_medium" role="alert">
                {errorMessage}
            </div>
        </template>

        <template lwc:if={hasData}>
            <div class="slds-p-horizontal_small slds-text-body_small slds-text-color_weak slds-p-bottom_x-small">
                {rows.length} rows · Snapshot date: {snapshotLabel}
            </div>
            <lightning-datatable
                key-field="rowKey"
                data={rows}
                columns={columns}
                hide-checkbox-column>
            </lightning-datatable>
        </template>

        <template lwc:if={isEmpty}>
            <div class="slds-align_absolute-center slds-p-around_large slds-text-color_weak">
                No pacing data found. Run the daily batch first or adjust filters.
            </div>
        </template>

    </lightning-card>
</template>
