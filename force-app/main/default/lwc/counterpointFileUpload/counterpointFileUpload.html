<template>
    <div class="cp-upload-container slds-p-around_medium">

        <!-- Upload UI (shown until a successful import completes) -->
        <template if:false={isComplete}>

            <div class="slds-form-element slds-m-bottom_medium">
                <label class="slds-form-element__label slds-text-heading_small">
                    Counterpoint CSV Import
                </label>
                <p class="slds-text-body_small slds-m-top_xx-small slds-text-color_weak">
                    Upload a Counterpoint export file (.csv). Select the date type that
                    matches how the Period column is formatted in this export.
                </p>
            </div>

            <lightning-radio-group
                name="dateType"
                label="Date Type"
                value={selectedDateType}
                options={dateTypeOptions}
                type="radio"
                onchange={handleDateTypeChange}
                class="slds-m-bottom_medium">
            </lightning-radio-group>

            <template if:false={isProcessing}>
                <lightning-file-upload
                    label="Upload Counterpoint CSV"
                    name="counterpointCsv"
                    accept={acceptedFormats}
                    record-id={recordId}
                    onuploadfinished={handleUploadFinished}
                    multiple="false">
                </lightning-file-upload>
            </template>

            <template if:true={isProcessing}>
                <div class="slds-is-relative slds-m-top_medium cp-spinner-wrapper">
                    <lightning-spinner
                        alternative-text="Processing file…"
                        size="medium">
                    </lightning-spinner>
                    <p class="slds-m-top_xx-large slds-text-align_center slds-text-body_small">
                        Parsing and queuing your import…
                    </p>
                </div>
            </template>

            <template if:true={hasError}>
                <div class="slds-notify slds-notify_alert slds-alert_error slds-m-top_medium" role="alert">
                    <lightning-icon icon-name="utility:error" size="x-small" variant="inverse"
                        class="slds-m-right_x-small">
                    </lightning-icon>
                    <span class="slds-assistive-text">Error</span>
                    <h2>{errorMessage}</h2>
                    <p class="slds-m-top_xx-small slds-text-body_small">
                        Please check the file and try again.
                    </p>
                </div>
            </template>

        </template>

        <!-- Success result (shown after a successful import) -->
        <template if:true={isComplete}>
            <div class="slds-notify slds-notify_alert slds-alert_success cp-success-box" role="status">
                <lightning-icon icon-name="utility:success" size="x-small" variant="inverse"
                    class="slds-m-right_x-small">
                </lightning-icon>
                <h2 class="slds-text-heading_small">Import Queued Successfully</h2>
            </div>

            <div class="slds-m-top_medium">
                <dl class="slds-dl_horizontal">
                    <dt class="slds-dl_horizontal__label slds-text-color_weak">Batch ID</dt>
                    <dd class="slds-dl_horizontal__detail cp-mono">{importBatchId}</dd>

                    <dt class="slds-dl_horizontal__label slds-text-color_weak">Total Rows</dt>
                    <dd class="slds-dl_horizontal__detail">{totalRows}</dd>

                    <dt class="slds-dl_horizontal__label slds-text-color_weak">Valid (queued)</dt>
                    <dd class="slds-dl_horizontal__detail">{validRows}</dd>

                    <dt class="slds-dl_horizontal__label slds-text-color_weak">Invalid / Duplicate</dt>
                    <dd class="slds-dl_horizontal__detail">{invalidRows}</dd>

                    <dt class="slds-dl_horizontal__label slds-text-color_weak">Date Type</dt>
                    <dd class="slds-dl_horizontal__detail">{selectedDateType}</dd>
                </dl>

                <p class="slds-m-top_small slds-text-body_small slds-text-color_weak">
                    Valid rows are being promoted to Actuals Records in the background.
                    Refresh the Related List in a few moments to see them.
                </p>
            </div>
        </template>

    </div>
</template>
